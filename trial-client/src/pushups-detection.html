<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pushup Tracker</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary: #00ff88;
            --secondary: #3b82f6;
            --bg-glass: rgba(15, 23, 42, 0.75);
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16/9;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input_video {
            display: none; 
        }

        .output_canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            pointer-events: none;
        }

        .counter-card {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 40px;
            border-radius: 15px;
            text-align: center;
            min-width: 200px;
        }

        .counter-card h2 {
            margin: 0;
            font-size: 1.2rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .counter-card .count {
            font-size: 4.5rem;
            font-weight: bold;
            color: var(--primary);
            margin: 10px 0;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            line-height: 1;
        }

        .counter-card .stage {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            margin-top: 5px;
        }

        .info-card {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 30px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-card span {
            font-size: 1.1rem;
            color: #cbd5e1;
            margin: 5px 0;
        }

        .tracking-side {
            color: var(--secondary);
            font-weight: bold;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            background: var(--bg-glass);
            padding: 20px 40px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div class="container">
        <video class="input_video"></video>
        <canvas class="output_canvas" width="1280" height="720"></canvas>
        
        <div class="loading" id="loadingText">Loading AI Model & Camera...</div>

        <div class="ui-panel">
            <div class="counter-card">
                <h2>Total Pushups</h2>
                <div class="count" id="pushupCount">0</div>
                <div class="stage" id="pushupStage">WAITING</div>
            </div>
            <div class="info-card">
                <span>Tracking: <span class="tracking-side" id="trackingSide">Detecting...</span></span>
                <span>Angle: <span id="currentAngle">0°</span></span>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.querySelector('.input_video');
        const canvasElement = document.querySelector('.output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loadingText');

        let counter = 0;
        let stage = 'UP';
        
        const DOWN_THRESHOLD = 100;  
        const UP_THRESHOLD = 150;   

        function calculateAngle(a, b, c) {
            const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
            let angle = Math.abs(radians * 180.0 / Math.PI);
            
            if (angle > 180.0) {
                angle = 360.0 - angle;
            }
            return angle;
        }

        function onResults(results) {
            if(loadingText.style.display !== 'none') {
                loadingText.style.display = 'none';
            }

            canvasCtx.setTransform(1, 0, 0, 1, 0, 0); 
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: 'rgba(255,255,255,0.2)', lineWidth: 2});
                drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#00ff88', lineWidth: 1, radius: 2});

                const leftArm = { shoulder: results.poseLandmarks[11], elbow: results.poseLandmarks[13], wrist: results.poseLandmarks[15] };
                const rightArm = { shoulder: results.poseLandmarks[12], elbow: results.poseLandmarks[14], wrist: results.poseLandmarks[16] };

                const leftVisibility = (leftArm.shoulder.visibility + leftArm.elbow.visibility + leftArm.wrist.visibility) / 3;
                const rightVisibility = (rightArm.shoulder.visibility + rightArm.elbow.visibility + rightArm.wrist.visibility) / 3;
                const shoulderDistance = Math.abs(leftArm.shoulder.x - rightArm.shoulder.x);

                let elbowAngle = 0;
                let trackingMode = "";
                let activeShoulder, activeElbow, activeWrist;

                if (leftVisibility > 0.5 && rightVisibility > 0.5 && shoulderDistance > 0.15) {
                    trackingMode = "Front Profile";
                    const leftAngle = calculateAngle(leftArm.shoulder, leftArm.elbow, leftArm.wrist);
                    const rightAngle = calculateAngle(rightArm.shoulder, rightArm.elbow, rightArm.wrist);
                    elbowAngle = (leftAngle + rightAngle) / 2;

                    canvasCtx.beginPath();
                    canvasCtx.moveTo(leftArm.shoulder.x * canvasElement.width, leftArm.shoulder.y * canvasElement.height);
                    canvasCtx.lineTo(leftArm.elbow.x * canvasElement.width, leftArm.elbow.y * canvasElement.height);
                    canvasCtx.lineTo(leftArm.wrist.x * canvasElement.width, leftArm.wrist.y * canvasElement.height);
                    canvasCtx.moveTo(rightArm.shoulder.x * canvasElement.width, rightArm.shoulder.y * canvasElement.height);
                    canvasCtx.lineTo(rightArm.elbow.x * canvasElement.width, rightArm.elbow.y * canvasElement.height);
                    canvasCtx.lineTo(rightArm.wrist.x * canvasElement.width, rightArm.wrist.y * canvasElement.height);
                    canvasCtx.lineWidth = 6;
                    canvasCtx.strokeStyle = stage === 'DOWN' ? '#ff0055' : '#00ff88';
                    canvasCtx.stroke();
                } else if (leftVisibility > rightVisibility && leftVisibility > 0.5) {
                    trackingMode = "Left Profile";
                    elbowAngle = calculateAngle(leftArm.shoulder, leftArm.elbow, leftArm.wrist);
                    activeShoulder = leftArm.shoulder;
                    activeElbow = leftArm.elbow;
                    activeWrist = leftArm.wrist;
                } else if (rightVisibility > 0.5) {
                    trackingMode = "Right Profile";
                    elbowAngle = calculateAngle(rightArm.shoulder, rightArm.elbow, rightArm.wrist);
                    activeShoulder = rightArm.shoulder;
                    activeElbow = rightArm.elbow;
                    activeWrist = rightArm.wrist;
                } else {
                    document.getElementById('trackingSide').innerText = "Searching for body...";
                    return;
                }

                document.getElementById('trackingSide').innerText = trackingMode;
                document.getElementById('currentAngle').innerText = Math.round(elbowAngle) + '°';

                if (trackingMode !== "Front Profile" && activeShoulder) {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(activeShoulder.x * canvasElement.width, activeShoulder.y * canvasElement.height);
                    canvasCtx.lineTo(activeElbow.x * canvasElement.width, activeElbow.y * canvasElement.height);
                    canvasCtx.lineTo(activeWrist.x * canvasElement.width, activeWrist.y * canvasElement.height);
                    canvasCtx.lineWidth = 6;
                    canvasCtx.strokeStyle = stage === 'DOWN' ? '#ff0055' : '#00ff88';
                    canvasCtx.stroke();
                }

                if (elbowAngle < DOWN_THRESHOLD && stage === 'UP') {
                    stage = 'DOWN';
                }
                
                if (elbowAngle > UP_THRESHOLD && stage === 'DOWN') {
                    stage = 'UP';
                    counter += 1;
                    document.getElementById('pushupCount').innerText = counter;
                }
                
                document.getElementById('pushupStage').innerText = stage;

                if (trackingMode === "Front Profile") {
                    const leftAngle = calculateAngle(leftArm.shoulder, leftArm.elbow, leftArm.wrist);
                    const rightAngle = calculateAngle(rightArm.shoulder, rightArm.elbow, rightArm.wrist);

                    canvasCtx.save();
                    canvasCtx.translate(leftArm.elbow.x * canvasElement.width + 30, leftArm.elbow.y * canvasElement.height);
                    canvasCtx.scale(-1, 1);
                    canvasCtx.font = 'bold 24px Segoe UI';
                    canvasCtx.fillStyle = '#ffffff';
                    canvasCtx.fillText(Math.round(leftAngle) + '°', 0, 0);
                    canvasCtx.restore();

                    canvasCtx.save();
                    canvasCtx.translate(rightArm.elbow.x * canvasElement.width - 30, rightArm.elbow.y * canvasElement.height);
                    canvasCtx.scale(-1, 1);
                    canvasCtx.font = 'bold 24px Segoe UI';
                    canvasCtx.fillStyle = '#ffffff';
                    canvasCtx.fillText(Math.round(rightAngle) + '°', 0, 0);
                    canvasCtx.restore();
                } else if (activeElbow) {
                    canvasCtx.save();
                    canvasCtx.translate(activeElbow.x * canvasElement.width + (trackingMode === 'Left Profile' ? 30 : -30), activeElbow.y * canvasElement.height);
                    canvasCtx.scale(-1, 1);
                    canvasCtx.font = 'bold 30px Segoe UI';
                    canvasCtx.fillStyle = '#ffffff';
                    canvasCtx.fillText(Math.round(elbowAngle) + '°', 0, 0);
                    canvasCtx.restore();
                }
            }
        }

        const pose = new Pose({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }});

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            enableSegmentation: false,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        pose.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await pose.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });

        camera.start();
    </script>
</body>
</html>
